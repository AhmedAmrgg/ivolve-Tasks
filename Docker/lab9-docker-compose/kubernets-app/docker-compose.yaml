version: "3.8"

volumes:
       db_mysql: 

services: 
       app: 
            build: .
            container_name: app-container 
            environment:
                DB_HOST: db
                DB_USER: user0
                DB_PASSWORD: 12345
            ports: 
                 - "3000:3000"
            depends_on:
                 - db

       db:
            image: mysql:8 
            container_name: mysql-db
            volumes:
                    - db_mysql:/var/lib/mysql  
            environment:  
                    MYSQL_ROOT_PASSWORD: pass123
                    MYSQL_DATABASE: ivolve
                    MYSQL_USER: user0
                    MYSQL_PASSWORD: 12345

